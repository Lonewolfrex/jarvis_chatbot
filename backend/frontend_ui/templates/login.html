{% load static %}

<!DOCTYPE html>
<html>

<head>

    <title>Jarvis AI Login</title>

    <link rel="stylesheet"
          href="{% static 'css/chat.css' %}">

</head>

<body class="center">

    <div class="login-box">

        <div class="logo-area">
            <h1>🤖 Jarvis AI</h1>
            <p>Your Personal AI Assistant</p>
        </div>

        <input
            id="username"
            type="text"
            placeholder="Username">

        <input
            id="password"
            type="password"
            placeholder="Password">

        <button onclick="login()">
            Login
        </button>

        <div id="errorMessage"
             class="error-message">
        </div>

        <div class="register-link">

            <span>
                New User?
            </span>

            <a href="/register/">
                Create Account
            </a>

        </div>

    </div>

<script>

async function login() {

    const username =
        document.getElementById(
            "username"
        ).value;

    const password =
        document.getElementById(
            "password"
        ).value;

    const errorBox =
        document.getElementById(
            "errorMessage"
        );

    errorBox.innerText = "";

    try {

        const response =
            await fetch(
                "/api/login/",
                {
                    method: "POST",
                    headers: {
                        "Content-Type":
                        "application/json"
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                }
            );

        const data =
            await response.json();

        if (!response.ok) {

            errorBox.innerText =
                "Invalid username or password";

            return;
        }

        localStorage.setItem(
            "access",
            data.access
        );

        localStorage.setItem(
            "refresh",
            data.refresh
        );

        window.location.href =
            "/chat/";

    }
    catch(err) {

        console.error(err);

        errorBox.innerText =
            "Unable to login.";

    }
}

</script>

</body>
</html>
