{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Jarvis AI</title>

    <link rel="stylesheet" href="{% static 'css/chat.css' %}">

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/highlight.min.js"></script>

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/highlight.js/styles/github-dark.min.css">
</head>

<body>

<div class="app-container">

    <aside class="sidebar">

        <div class="sidebar-header">

            <h2>🤖 Jarvis</h2>

            <button
                class="new-chat-btn"
                onclick="createNewChat()">
                <span>✨</span>
                <span>New Chat</span>
            </button>
            <div class="sidebar-search">
                <input
                    type="text"
                    id="chatSearch"
                    placeholder="Search chats..."
                    onkeyup="filterChats()">
            </div>

        </div>

        <div id="sessionsList" class="sessions-list"></div>

        <button
            class="logout-btn"
            onclick="logout()">
            🚪 Logout
        </button>

    </aside>

    <main class="chat-area">

        <div class="chat-header">
            <span id="sessionInfo">Loading...</span>
        </div>

        <div
            id="messages"
            class="messages">
        </div>

        <div class="chat-footer">

            <div class="input-box">

                <input
                    id="messageInput"
                    type="text"
                    placeholder="Ask Jarvis anything..."
                    onkeypress="if(event.key==='Enter'){sendMessage()}">

                <button
                    id="sendButton"
                    onclick="sendMessage()">
                    ➤ Send
                </button>

            </div>

            <div class="footer">
                Jarvis AI • Powered by Ollama • Local & Private
            </div>

        </div>

    </main>

</div>

<script src="{% static 'js/chat.js' %}"></script>

</body>
</html>
