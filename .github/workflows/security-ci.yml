name: Jarvis Security CI

on:
  push:
    branches:
      - main
      - security-fix1
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  #################################################
  # CODEQL
  #################################################
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: [python]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: +security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  #################################################
  # DJANGO + BANDIT + PIP-AUDIT
  #################################################
  security-scan:
    name: Security Checks
    runs-on: ubuntu-latest
    needs: codeql

    env:
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip

          pip install -r backend/requirements.txt

          pip install \
            bandit \
            pip-audit

      - name: Django Check
        run: |
          cd backend
          python manage.py check

      - name: Django Deploy Check
        run: |
          cd backend
          python manage.py check --deploy

      - name: Run Bandit
        run: |
          bandit \
            -r backend \
            -f json \
            -o bandit-results.json \
            --exit-zero

      - name: Upload Bandit Report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-results.json

      - name: Dependency Audit
        run: |
          pip-audit \
            -r backend/requirements.txt \
            -f json \
            -o pip-audit-report.json || true

      - name: Upload Dependency Audit
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  #################################################
  # GITLEAKS
  #################################################
  gitleaks:
    name: Secret Scanning
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  #################################################
  # TRIVY DOCKER SCAN
  #################################################
  docker-security:
    name: Docker Security
    runs-on: ubuntu-latest
    needs: gitleaks

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build \
            -t jarvis:latest \
            ./backend

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: jarvis:latest
          format: table
          output: trivy-report.txt
          exit-code: 0
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Convert Trivy Report to HTML
        run: |
          echo "<html><body><h1>Jarvis Trivy Report</h1><pre>" > trivy-report.html
          cat trivy-report.txt >> trivy-report.html
          echo "</pre></body></html>" >> trivy-report.html

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-html
          path: trivy-report.html

